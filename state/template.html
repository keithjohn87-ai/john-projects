<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Resources - ContractorPro</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <span class="logo-icon">🏗️</span>
                <span class="logo-text">ContractorPro</span>
            </a>
            <div class="nav-links">
                <a href="../index.html#features">Features</a>
                <a href="../index.html#pricing">Pricing</a>
                <a href="../index.html#states">State Resources</a>
                <a href="../index.html#sba">SBA Guide</a>
            </div>
            <div class="nav-actions">
                <button class="btn btn-ghost" onclick="showAccountModal()">Account</button>
                <button class="btn btn-primary cart-btn" onclick="showCart()">
                    Cart <span class="cart-badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="state-page" style="padding-top: 80px;">
        <div class="container">
            <div id="stateContent">
                <h1>Loading state information...</h1>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        const pathParts = window.location.pathname.split('/');
        const stateCode = pathParts[pathParts.length - 2] || 'CA';

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        fetch('../data/states.json')
            .then(res => res.json())
            .then(data => {
                const state = data[stateCode];
                if (!state) {
                    document.getElementById('stateContent').innerHTML = `
                        <h1>State Not Found</h1>
                        <p>We don't have detailed information for this state yet.</p>
                        <a href="../index.html" class="btn btn-primary">Back to Home</a>
                    `;
                    return;
                }

                const verifiedBadge = state.last_verified
                    ? `<div style="display:inline-block; background:#1e3a5f; color:#fff;
                          padding:0.4rem 0.9rem; border-radius:9999px; font-size:0.85rem;
                          font-weight:600; margin-bottom:1rem;">
                          ✓ Verified ${escapeHtml(state.last_verified)} · primary statute + agency sources
                        </div>`
                    : '';

                const notesBlock = (Array.isArray(state.notes_2026) && state.notes_2026.length)
                    ? `<div class="resource-section" style="grid-column: 1 / -1;
                          background: #fff8dc; border-left: 4px solid #ffd700;
                          padding: 1.5rem; border-radius: 12px;">
                          <h2 style="color:#1e3a5f;">⚡ Recent changes you may have missed</h2>
                          <p style="color:#666; font-size:0.9rem; margin-bottom:1rem;">
                            2024–2026 legislative, regulatory, and case-law changes that
                            affect ${escapeHtml(state.name)} contractors. Most generic templates
                            still cite the old rules. Ours don't.
                          </p>
                          <ul style="margin-left:1.5rem; line-height:1.7;">
                            ${state.notes_2026.map(n => `<li>${escapeHtml(n)}</li>`).join('')}
                          </ul>
                        </div>`
                    : '';

                document.getElementById('stateContent').innerHTML = `
                    ${verifiedBadge}
                    <h1>${escapeHtml(state.name)} Contractor Resources</h1>
                    <p style="color:#6b7280;">
                      Licensing, lien law, prompt-pay, retainage, and tax compliance —
                      every rule with statute citation, current as of
                      ${escapeHtml(state.last_verified || 'recently audited')}.
                    </p>
                    <div class="state-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; margin-top: 2rem;">
                        <div class="resource-section" style="background: #f9fafb; padding: 1.5rem; border-radius: 12px;">
                            <h2>📋 Licensing</h2>
                            <p><strong>${escapeHtml(state.licensing.board)}</strong></p>
                            <a href="${escapeHtml(state.licensing.url)}" target="_blank" rel="noopener" style="color: #1e3a5f;">Visit Board Website →</a>
                            <h3 style="margin-top: 1rem;">Requirements:</h3>
                            <ul style="margin-left: 1.5rem; margin-top: 0.5rem; line-height:1.7;">
                                ${state.licensing.requirements.map(r => `<li>${escapeHtml(r)}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="resource-section" style="background: #f9fafb; padding: 1.5rem; border-radius: 12px;">
                            <h2>⚖️ Lien Laws</h2>
                            <p><strong>Preliminary Notice:</strong> ${escapeHtml(state.lien.preliminary_notice)}</p>
                            <p style="margin-top:0.75rem;"><strong>Filing Deadline:</strong> ${escapeHtml(state.lien.deadline)}</p>
                            <p style="margin-top:0.75rem;"><strong>Foreclosure:</strong> ${escapeHtml(state.lien.foreclosure)}</p>
                        </div>
                        <div class="resource-section" style="background: #f9fafb; padding: 1.5rem; border-radius: 12px;">
                            <h2>💰 Taxes</h2>
                            <p><strong>Sales Tax:</strong> ${escapeHtml(state.taxes.sales_tax)}</p>
                            <p style="margin-top:0.75rem;"><strong>Contractor Tax:</strong> ${escapeHtml(state.taxes.contractor_tax)}</p>
                        </div>
                        <div class="resource-section" style="background: #f9fafb; padding: 1.5rem; border-radius: 12px;">
                            <h2>📄 Documents</h2>
                            <p style="color:#6b7280;">Templates included with the
                              <a href="../index.html#pricing" style="color:#1e3a5f;">Essential, Professional, Business, and Complete bundles</a>:</p>
                            <ul style="margin-left: 1.5rem; line-height:1.8;">
                                <li>Preliminary Notice Template</li>
                                <li>Mechanics Lien Form</li>
                                <li>Release of Lien</li>
                                <li>Construction Contract Agreement</li>
                            </ul>
                            <a href="../index.html#pricing" class="btn btn-primary" style="margin-top: 1rem; display:inline-block;">See Pricing</a>
                        </div>
                        ${notesBlock}
                    </div>
                `;
            });
    </script>
</body>
</html>
