name: Deploy Trading Card Database

on:
  push:
    branches: [ main, master ]
    paths:
      - 'trading-card-db/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install Dependencies
      run: |
        cd trading-card-db
        npm install
    
    - name: Build
      run: |
        cd trading-card-db
        npm run build
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./trading-card-db/dist
        publish_branch: gh-pages
        destination_dir: trading-card-db
