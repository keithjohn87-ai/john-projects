name: Deploy Construction Templates

on:
  push:
    branches: [ main, master ]
    paths:
      - 'construction-templates/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Build
      run: |
        cd construction-templates
        # Build steps will go here
        echo "Build complete"
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./construction-templates
        publish_branch: gh-pages
        destination_dir: construction-templates
